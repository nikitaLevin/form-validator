<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Sign Up</h2>
        <form id="myform">
            <div class="form-grid">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="text" id="email" name="email" placeholder="Enter your email" required>
                    <span class="hint" id="hint-email">Please enter a valid email</span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create password" required>
                    <span class="hint" id="hint-password">Min 8 characters, at least 1 number and 1 uppercase letter</span>
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" name="phone" placeholder="Enter your phone" required>
                    <span class="hint" id="hint-phone">Please enter a valid phone number</span>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
                    <span class="hint" id="hint-confirmPassword">Passwords do not match</span>
                </div>
            </div>
            <div class="form-footer">
                <button type="submit">Submit Now</button>
            </div>
        </form>
    </div>

    <script src="plugins/validator/validator.js"></script>
    <script>
        const valid = new Validator({
            selector: '#myform',
            pattern: {
                phone: '',
                email: '',
                password: '',
            },
            method: {
                'email': [['notEmpty'], ['email']],
                'phone': [['notEmpty'], ['pattern', 'phone']],
                'password': [['notEmpty'], ['password']],
                'confirmPassword': [['notEmpty'], ['confirmPassword']]
            }
        });

        valid.init();
    </script>
</body>
</html>
